services:
  search-api:
    build:
      context: ./SearchEngine/
      dockerfile: SeachEngineAPI/Dockerfile
    ports:
      - "5001:8082"
    volumes:
      - ./Data:/app/data # Mount your local Data folder into container
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DB_PATH=

  load-balancer:
    build:
      context: ./SearchEngine/
      dockerfile: LoadBalancerAPI/Dockerfile
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  frontend:
    build:
      context: "C:/Users/brolo/Desktop/it-arkitektur/Semester-6/Arkitektur-principper/SearchEngineV2/SearchEngieV2Front/my-search-engine-app"
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=development
