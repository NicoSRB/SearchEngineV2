version: "3.9"

services:
  search-api:
    build:
      context: ./SearchEngine/
      dockerfile: SeachEngineAPI/Dockerfile
    ports:
      - "5001:8082"
    volumes:
      - ./Data:/app/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8082
      - Redis_CONNECTION=redis
      - POSTGRES_CONNECTION_STRING=Host=postgres;Username=postgres;Password=password;Database=indexerdb
      - MONGO_CONNECTION_STRING=mongodb://root:password@mongodb:27017
    depends_on:
      - redis

  load-balancer:
    build:
      context: ./SearchEngine/
      dockerfile: LoadBalancerAPI/Dockerfile
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  frontend:
    build:
      context: "C:/Users/brolo/Desktop/it-arkitektur/Semester-6/Arkitektur-principper/SearchEngineV2/SearchEngieV2Front/my-search-engine-app"
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=development

  termnet:
    build:
      context: ./SearchEngine/
      dockerfile: TermnetAPI/Dockerfile
    ports:
      - "5003:8083"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8083

  indexer:
    build:
      context: ./SearchEngine/
      dockerfile: Indexer/Dockerfile
    command: ["dotnet", "indexer.dll"]
    volumes:
      - ./Data:/app/data
    environment:
      - POSTGRES_CONNECTION_STRING=Host=postgres;Username=postgres;Password=password;Database=indexerdb
      - MONGO_CONNECTION_STRING=mongodb://root:password@mongodb:27017
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=indexerdb
      - DB_USER=postgres
      - DB_PASSWORD=passsword
    depends_on:
      - postgres
      - mongo
    networks:
      - postgres-db-network

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki/loki-config.yaml
    command: -config.file=/etc/loki/loki-config.yaml

  prometheus:
    image: prom/prometheus:v2.46.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus-config:/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=indexerdb
    ports:
      - "5432:5432"
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    networks:
      - postgres-db-network

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: teste@teste.com
      PGADMIN_DEFAULT_PASSWORD: teste
    ports:
      - "16543:80"
    volumes:
      - ./servers.json:/pgadmin4/servers.json
    networks:
      - postgres-db-network

  mongo:
    image: mongo:8.0
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb

volumes:
  mongo-data:
  mongo-config:
  postgres-db-volume:
  grafana-data:

networks:
  postgres-db-network:
    driver: bridge
