apiVersion: batch/v1
kind: Job
metadata:
  name: indexer
  namespace: searchengine
spec:
  template:
    spec:
      containers:
        - name: indexer
          image: broloes2/search-indexer:latest
          env:
            - name: DATA_PATH
              value: /data/seData/medium
            - name: DB_HOST
              value: postgres-postgresql
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: indexerdb
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-postgresql
                  key: postgres-password
            - name: MONGO_USER
              value: root
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongo-mongodb
                  key: mongodb-root-password
            - name: MONGO_HOST
              value: mongo-mongodb
            - name: MONGO_PORT
              value: "27017"
          volumeMounts:
            - mountPath: /data/seData/medium
              name: indexer-data
      restartPolicy: Never
      volumes:
        - name: indexer-data
          hostPath: 
            path: /data/seData/medium
            type: Directory
  backoffLimit: 1
