version: '3.8'

services:
  search-api:
    build:
      context: .
      dockerfile: SeachEngineAPI/Dockerfile
    container_name: search-api
    ports:
      - "8080:8080"
    environment:
      - REDIS_CONNECTION=redis:6379
    depends_on:
      - redis

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
