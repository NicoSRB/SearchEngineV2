apiVersion: apps/v1
kind: Deployment
metadata:
  name: searchengine-mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: searchengine-mongo
  template:
    metadata:
      labels:
        app: searchengine-mongo
    spec:
      containers:
        - name: searchengine-mongo
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 80
